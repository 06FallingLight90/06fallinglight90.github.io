<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FL-MAINPAGE</title>

  <link rel="icon" type="image/x-icon" href="./images/favicon.ico">

  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/decoration.css">
  <link rel="stylesheet" href="css/linkcard.css">
  <link rel="stylesheet" href="css/searchtag.css">
  <style>
    .topBar {
      text-align: center;
      background: white;
      border-radius: 10px;
    }

    #welcome-text {
      color: aqua;
      font-size: 2rem;
      font-family: "whiteRoad", 'Microsoft YaHei', sans-serif;
    }

    #WT-2 {
      background: linear-gradient(to right,
          red, orange, yellow, green, blue, indigo, violet);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-size: 4rem;
      font-family: "dynalight", 'Microsoft YaHei', sans-serif;
    }

    #WT-4 {
      color: aquamarine;
      text-decoration: line-through solid gray 2px;
    }

    body {
      margin: 0;
      /* 清除body默认边距 */
      background: #f0f2f5;
      /* 两边露出的背景色 */

      /* 确保图片覆盖整个页面 */
      background-size: cover;

      /* 图片不重复 */
      background-repeat: no-repeat;

      /* 图片居中显示 */
      background-position: center;

      /* 固定背景，滚动时不动（视差效果） */
      background-attachment: fixed;

      padding: 0;
    }

    /*中间主内容列的css*/
    .main-content {
      max-width: 1200px;
      /* 主体内容最大宽度 */
      margin: 0 auto;
      /* 水平居中，自动左右边距 */
      background: rgba(255, 255, 255, 0.5);
      /* 主体内容背景色与透明度 */
      padding: 20px;
      /* 内容内边距 */
      min-height: 100vh;
      /* 最小高度占满视口 */
    }
  </style>
</head>

<body>
  <!--右悬浮-->
  <div class="rightFloat">
    <img src="./images/figure.png" alt="">
  </div>
  <!--中间栏-->
  <div class="main-content">
    <div class="topBar">
      <h1 id="welcome-text">
        <span id="WT-1">欢迎来到</span>
        <br>
        <span id="WT-2">Falling_light</span>
        <br>
        <span id="WT-3">的</span>
        <span id="WT-4">懒惰摆烂实验型</span>
        <span id="WT-5">个人主页！！</span>
      </h1>
    </div>

    <div class="content">
      <!--搜索栏-->
      <div class="bing-search-section">
        <form action="https://www.bing.com/search" method="get" target="_blank" class="search-form">
          <input type="text" name="q" placeholder="输入关键词..." class="search-input">
          <button type="submit" class="search-btn">搜索</button>
        </form>
      </div>


      <!--常用网页区-->
      <div class="icon-links-grid">
        <a href="https://bilibili.com" target="_blank" class="icon-link">
          <div class="icon-wrapper">
            <img src="https://www.bilibili.com/favicon.ico" alt="Bilibili">
          </div>
          <span class="icon-name">Bilibili</span>
        </a>

        <a href="https://deepseek.com" target="_blank" class="icon-link">
          <div class="icon-wrapper">
            <img src="https://www.deepseek.com/favicon.ico" alt="DS">
          </div>
          <span class="icon-name">deepseek</span>
        </a>

        <a href="https://jwc.seu.edu.cn" target="_blank" class="icon-link">
          <div class="icon-wrapper">
            <img src="/images/seu-icon.ico">
          </div>
          <span class="icon-name">教务处</span>
        </a>

        <a href="https://ehall.seu.edu.cn/new/index.html" target="_blank" class="icon-link">
          <div class="icon-wrapper">
            <img src="/images/seu-icon.ico">
          </div>
          <span class="icon-name">网上办事服务大厅</span>
        </a>

        <a href="https://software.seu.edu.cn/" target="_blank" class="icon-link">
          <div class="icon-wrapper">
            <img src="/images/seu-icon.ico">
          </div>
          <span class="icon-name">软件正版化</span>
        </a>

        <a href="https://lib.seu.edu.cn/" target="_blank" class="icon-link">
          <div class="icon-wrapper">
            <img src="/images/seu-icon.ico">
          </div>
          <span class="icon-name">李文正图书馆</span>
        </a>
      </div>




      <!-- 空白占位-->
      <div style="height: 2000px;"></div>
      <a id='easterEgg'
        href="https://www.bilibili.com/video/BV1Rs411R7Hi/?spm_id_from=333.337.search-card.all.click&vd_source=7c7f22e2f24c9c9e641c899da241d437">这是一个藏得很传统的彩蛋</a>
    </div>
  </div>

  <!-- 添加对话框元素 -->
  <div id="messageBox">✨ <span id="messageText">加载中...</span></div>

  <!-- 飞来飞去的小图片 -->
  <img src="./images/fly.gif" alt="飞行图片加载失败" class="flying-image" id="flyer">

  <script src="js/flyer.js"></script>
  <script src="js/message-box.js"></script>
</body>

</html>
