<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FL-MAINPAGE</title>

  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/decoration.css">
  <style>
    .topBar {
      text-align: center;
      background: white;
      border-radius: 10px;
    }

    #welcome-text {
      color: aqua;
      font-size: 2rem;
      font-family: "whiteRoad", 'Microsoft YaHei', sans-serif;
    }

    #WT-2 {
      background: linear-gradient(to right,
          red, orange, yellow, green, blue, indigo, violet);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-size: 4rem;
      font-family: "dynalight", 'Microsoft YaHei', sans-serif;
    }

    #WT-4 {
      color: aquamarine;
      text-decoration: line-through solid gray 2px;
    }

    body {
      margin: 0;
      /* 清除body默认边距 */
      background: #f0f2f5;
      /* 两边露出的背景色 */

      /* 确保图片覆盖整个页面 */
      background-size: cover;

      /* 图片不重复 */
      background-repeat: no-repeat;

      /* 图片居中显示 */
      background-position: center;

      /* 固定背景，滚动时不动（视差效果） */
      background-attachment: fixed;

      padding: 0;
    }

    /*中间主内容列的css*/
    .main-content {
      max-width: 1200px;
      /* 主体内容最大宽度 */
      margin: 0 auto;
      /* 水平居中，自动左右边距 */
      background: rgba(255, 255, 255, 0.5);
      /* 主体内容背景色与透明度 */
      padding: 20px;
      /* 内容内边距 */
      min-height: 100vh;
      /* 最小高度占满视口 */
    }
  </style>
</head>

<body>
  <!--右悬浮-->
  <div class="rightFloat">
    <img src="./images/figure.png" alt="">
  </div>
  <!--中间栏-->
  <div class="main-content">
    <div class="topBar">
      <h1 id="welcome-text">
        <span id="WT-1">欢迎来到</span>
        <br>
        <span id="WT-2">Falling_light</span>
        <br>
        <span id="WT-3">的</span>
        <span id="WT-4">懒惰摆烂实验型</span>
        <span id="WT-5">个人主页！！</span>
      </h1>
    </div>

    <div class="content">
      <p>点击输人文木</p>
      <!-- 空白占位-->
      <div style="height: 2000px;"></div>
      <a id='easterEgg'
        href="https://www.bilibili.com/video/BV1Rs411R7Hi/?spm_id_from=333.337.search-card.all.click&vd_source=7c7f22e2f24c9c9e641c899da241d437">这是一个藏得很传统的彩蛋</a>
    </div>
  </div>

  <!-- 在页面底部添加对话框元素 -->
  <div id="messageBox">✨ <span id="messageText">加载中...</span></div>

  <!-- 飞来飞去的小图片 -->
  <img src="./images/fly.gif" alt="飞行图片加载失败" class="flying-image" id="flyer">

  <script src="js/flyer.js"></script>
  <script src="js/message-box.js"></script>
</body>

</html>
